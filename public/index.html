<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photo of the Day · Wrangell.dog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #ece4cf;
      --bg-deep: #e3dabf;
      --ink: #1a1410;
      --ink-muted: #6b5d48;
      --accent: #c43d1f;
      --rule: rgba(26, 20, 16, 0.85);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { background: var(--bg); }

    body {
      font-family: 'Fraunces', Georgia, serif;
      color: var(--ink);
      background: var(--bg);
      background-image:
        radial-gradient(rgba(26, 20, 16, 0.05) 1px, transparent 1px),
        radial-gradient(rgba(26, 20, 16, 0.025) 1px, transparent 1px);
      background-size: 3px 3px, 7px 7px;
      background-position: 0 0, 1px 2px;
      min-height: 100vh;
      line-height: 1.4;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .page {
      max-width: 1280px;
      margin: 0 auto;
      padding: 40px 36px 72px;
    }

    /* ---------- Masthead ---------- */
    .masthead {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 24px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink-muted);
      padding-bottom: 14px;
      border-bottom: 1px solid var(--rule);
      animation: rise 0.9s ease-out both;
    }
    .masthead a {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid rgba(26, 20, 16, 0.25);
      padding-bottom: 1px;
      transition: color 0.2s, border-color 0.2s;
    }
    .masthead a:hover { color: var(--accent); border-bottom-color: var(--accent); }
    .masthead .mark { color: var(--accent); margin-right: 8px; }

    /* ---------- Kicker ---------- */
    .kicker {
      margin-top: 56px;
      margin-bottom: 12px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--ink-muted);
      animation: rise 1.0s 0.1s ease-out both;
    }

    /* ---------- Date headline ---------- */
    .date-line {
      font-weight: 300;
      font-size: clamp(42px, 8vw, 120px);
      line-height: 0.92;
      letter-spacing: -0.03em;
      margin-bottom: 40px;
      font-variation-settings: "opsz" 144;
      animation: rise 1.1s 0.18s ease-out both;
    }
    .date-line em {
      font-style: italic;
      font-weight: 420;
      color: var(--accent);
    }

    /* ---------- Photo ---------- */
    .photo-wrap {
      animation: rise 1.0s 0.3s ease-out both;
    }

    .frame {
      position: relative;
      background: var(--bg-deep);
    }
    .frame::after {
      content: "";
      position: absolute;
      inset: 0;
      box-shadow: inset 0 0 0 1px rgba(26, 20, 16, 0.08);
      pointer-events: none;
    }
    .frame img {
      width: 100%;
      height: auto;
      display: block;
      filter: contrast(1.02) saturate(0.96);
    }

    figcaption {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 24px;
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid var(--rule);
    }
    .plate-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
      white-space: nowrap;
    }
    .plate-note {
      font-size: clamp(14px, 1.3vw, 17px);
      font-style: italic;
      color: var(--ink-muted);
      text-align: right;
      font-variation-settings: "opsz" 14;
    }

    /* ---------- Footer ---------- */
    footer {
      margin-top: 80px;
      padding-top: 16px;
      border-top: 1px solid var(--rule);
      display: flex;
      justify-content: space-between;
      gap: 24px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink-muted);
      animation: rise 1.0s 0.44s ease-out both;
    }
    footer a {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid rgba(26, 20, 16, 0.25);
      padding-bottom: 1px;
      transition: color 0.2s, border-color 0.2s;
    }
    footer a:hover { color: var(--accent); border-bottom-color: var(--accent); }
    footer .ornament { color: var(--accent); margin-right: 8px; font-size: 13px; }

    @keyframes rise {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; }
    }

    @media (max-width: 760px) {
      .page { padding: 24px 20px 56px; }
      .date-line { font-size: 13vw; margin-top: 36px; }
      figcaption { flex-direction: column; align-items: flex-start; gap: 6px; }
      .plate-note { text-align: left; }
      footer { flex-direction: column; gap: 6px; margin-top: 56px; }
    }

    /* ---------- Celebration Modal ---------- */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(26, 20, 16, 0.72);
      backdrop-filter: blur(3px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9000;
      padding: 24px;
      animation: fade-in 0.35s ease-out both;
    }
    .modal-backdrop.hidden { display: none; }

    .modal-card {
      background: var(--bg);
      max-width: 520px;
      width: 100%;
      max-height: calc(100vh - 48px);
      overflow-y: auto;
      position: relative;
      border: 1px solid rgba(26, 20, 16, 0.12);
      box-shadow: 0 8px 40px rgba(26, 20, 16, 0.45);
      animation: rise 0.4s 0.1s ease-out both;
    }
    .modal-img-wrap {
      background: var(--bg-deep);
      padding: 14px 14px 0;
    }
    .modal-img {
      width: 100%;
      height: auto;
      display: block;
      filter: contrast(1.02) saturate(0.96);
    }
    .modal-body {
      padding: 20px 24px 24px;
      border-bottom: 1px solid var(--rule);
    }
    .modal-eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
    }
    .modal-headline {
      font-size: clamp(20px, 4vw, 28px);
      font-weight: 350;
      line-height: 1.15;
      letter-spacing: -0.02em;
      font-variation-settings: "opsz" 48;
      margin-bottom: 10px;
    }
    .modal-headline em {
      font-style: italic;
      font-weight: 500;
      color: var(--accent);
    }
    .modal-note {
      font-size: 14px;
      font-style: italic;
      color: var(--ink-muted);
      font-variation-settings: "opsz" 14;
      margin-bottom: 20px;
      line-height: 1.5;
    }
    .modal-dismiss {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-muted);
      background: none;
      border: 1px solid rgba(26, 20, 16, 0.3);
      padding: 8px 16px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }
    .modal-dismiss:hover { color: var(--accent); border-color: var(--accent); }
    .modal-close {
      position: absolute;
      top: 12px;
      right: 12px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 16px;
      line-height: 1;
      color: var(--bg);
      background: rgba(26, 20, 16, 0.55);
      border: none;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s;
    }
    .modal-close:hover { background: var(--accent); }

    @keyframes fade-in {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="masthead">
      <span><span class="mark">●</span>Wrangell.dog</span>
      <span><a href="gallery.html">Gallery →</a></span>
    </div>

    <p class="kicker">Daily edition</p>
    <h1 class="date-line" id="date-display">&nbsp;</h1>

    <div class="photo-wrap">
      <figure>
        <div class="frame">
          <img id="potd-img" src="" alt="Wrangell, photo of the day">
        </div>
        <figcaption>
          <span class="plate-num" id="plate-label">Plate №—</span>
          <span class="plate-note" id="plate-caption">&nbsp;</span>
        </figcaption>
      </figure>
    </div>

    <footer>
      <span>© MMXXVI · <a href="gallery.html">Wrangell.dog</a></span>
      <span><a href="#" id="shuffle-link">Different photo</a></span>
      <span><a href="classic.html">Classic view</a></span>
      <span><span class="ornament">❦</span>Updated daily</span>
    </footer>
  </div>

  <div class="modal-backdrop hidden" id="celebration-modal" role="dialog" aria-modal="true" aria-label="Wrangell graduates nose work">
    <div class="modal-card">
      <button class="modal-close" id="modal-close-x" aria-label="Close">×</button>
      <div class="modal-body">
        <p class="modal-eyebrow">Special announcement · Class of 2026</p>
        <h2 class="modal-headline">Wrangell graduates from <em>intermediate nose work</em></h2>
        <p class="modal-note">He found every single hide. We are so very proud of him.</p>
        <button class="modal-dismiss" id="modal-dismiss">Congratulations, Wrangell ↗</button>
      </div>
      <div class="modal-img-wrap">
        <img class="modal-img" src="images/dog-100.jpeg" alt="Wrangell with his nose work graduation certificate">
      </div>
    </div>
  </div>

  <script src="captions.js"></script>
  <script>
    (() => {
      const captions = window.WRANGELL_CAPTIONS || [];
      const TOTAL = captions.length || 99;

      function todayIndex() {
        const d = new Date();
        const seed = d.getFullYear() * 10000 + (d.getMonth() + 1) * 100 + d.getDate();
        return (seed % TOTAL) + 1;
      }

      function fmt2(n) { return String(n).padStart(2, '0'); }

      function setImage(n) {
        document.getElementById('potd-img').src = `images/dog-${n}.jpeg`;
        document.getElementById('potd-img').alt = `Wrangell, plate ${n}`;
        document.getElementById('plate-label').textContent = `Plate №${fmt2(n)}`;
        document.getElementById('plate-caption').textContent = captions[n - 1] || '';
      }

      function renderDate() {
        const d = new Date();
        const months = ['January','February','March','April','May','June',
                        'July','August','September','October','November','December'];
        const day = d.getDate();
        const suffix = [,'st','nd','rd'][day % 100 > 10 && day % 100 < 14 ? 0 : day % 10] || 'th';
        document.getElementById('date-display').innerHTML =
          `${months[d.getMonth()]} <em>${day}${suffix}</em>`;
      }

      let shuffleIndex = null;

      document.getElementById('shuffle-link').addEventListener('click', (e) => {
        e.preventDefault();
        const daily = todayIndex();
        let next;
        do {
          next = Math.floor(Math.random() * TOTAL) + 1;
        } while (next === (shuffleIndex ?? daily));
        shuffleIndex = next;
        setImage(next);
      });

      renderDate();
      setImage(todayIndex());
    })();
  </script>

  <script>
    (() => {
      const SEEN_KEY = 'wrangell-nosework-2026';
      const modal = document.getElementById('celebration-modal');

      function dismiss() {
        modal.classList.add('hidden');
        localStorage.setItem(SEEN_KEY, '1');
      }

      if (!localStorage.getItem(SEEN_KEY)) {
        modal.classList.remove('hidden');
        document.getElementById('modal-close-x').addEventListener('click', dismiss);
        document.getElementById('modal-dismiss').addEventListener('click', dismiss);
        modal.addEventListener('click', (e) => { if (e.target === modal) dismiss(); });
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') dismiss(); });
      }
    })();
  </script>
</body>
</html>
