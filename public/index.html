<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Best Dog · A Monograph</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #ece4cf;
      --bg-deep: #e3dabf;
      --ink: #1a1410;
      --ink-muted: #6b5d48;
      --accent: #c43d1f;
      --rule: rgba(26, 20, 16, 0.85);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { background: var(--bg); }

    body {
      font-family: 'Fraunces', Georgia, serif;
      color: var(--ink);
      background: var(--bg);
      background-image:
        radial-gradient(rgba(26, 20, 16, 0.05) 1px, transparent 1px),
        radial-gradient(rgba(26, 20, 16, 0.025) 1px, transparent 1px);
      background-size: 3px 3px, 7px 7px;
      background-position: 0 0, 1px 2px;
      min-height: 100vh;
      line-height: 1.4;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .page {
      max-width: 1280px;
      margin: 0 auto;
      padding: 40px 36px 72px;
    }

    /* ---------- Masthead ---------- */
    .masthead {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 24px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink-muted);
      padding-bottom: 14px;
      border-bottom: 1px solid var(--rule);
      animation: rise 0.9s ease-out both;
    }
    .masthead .vol { color: var(--ink); }
    .masthead .mark { color: var(--accent); margin-right: 8px; }

    /* ---------- Headline ---------- */
    .headline {
      font-weight: 380;
      font-size: clamp(64px, 13vw, 200px);
      line-height: 0.9;
      letter-spacing: -0.035em;
      margin-top: 56px;
      margin-bottom: 32px;
      font-variation-settings: "opsz" 144;
      animation: rise 1.1s 0.08s ease-out both;
    }
    .headline em {
      font-style: italic;
      font-weight: 420;
      color: var(--accent);
      padding-right: 0.04em;
    }
    .headline .period { color: var(--accent); }

    .dek {
      max-width: 560px;
      font-size: clamp(17px, 1.6vw, 21px);
      font-style: italic;
      line-height: 1.45;
      color: var(--ink-muted);
      font-variation-settings: "opsz" 18;
      animation: rise 1.1s 0.2s ease-out both;
    }

    /* ---------- Section label ---------- */
    .section-label {
      display: flex;
      align-items: baseline;
      gap: 14px;
      margin-top: 120px;
      margin-bottom: 28px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--ink-muted);
      animation: rise 1.0s 0.32s ease-out both;
    }
    .section-label .line {
      flex: 1;
      height: 1px;
      background: var(--rule);
    }

    /* ---------- Plates ---------- */
    main {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 24px;
      row-gap: 112px;
    }

    .plate {
      position: relative;
      animation: rise 1.0s ease-out both;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .plate:focus-visible { outline: 2px solid var(--accent); outline-offset: 6px; }
    .plate-1 { grid-column: 1 / span 8; animation-delay: 0.42s; }
    .plate-2 { grid-column: 6 / span 7; animation-delay: 0.56s; }
    .plate-3 { grid-column: 2 / span 10; animation-delay: 0.70s; }

    .plate figure { margin: 0; }
    .frame {
      position: relative;
      overflow: hidden;
      background: var(--bg-deep);
    }
    .frame::after {
      content: "";
      position: absolute;
      inset: 0;
      box-shadow: inset 0 0 0 1px rgba(26, 20, 16, 0.08);
      pointer-events: none;
    }
    .plate img {
      width: 100%;
      height: auto;
      display: block;
      filter: contrast(1.02) saturate(0.96);
      transition: transform 0.7s cubic-bezier(0.2, 0.7, 0.2, 1);
    }
    .plate:hover img { transform: scale(1.018); }

    figcaption {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 24px;
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid var(--rule);
    }
    .plate-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
      white-space: nowrap;
    }
    .plate-title {
      font-size: clamp(15px, 1.4vw, 18px);
      font-style: italic;
      color: var(--ink);
      text-align: right;
      font-variation-settings: "opsz" 14;
    }

    /* ---------- Footer ---------- */
    footer {
      margin-top: 140px;
      padding-top: 16px;
      border-top: 1px solid var(--rule);
      display: flex;
      justify-content: space-between;
      gap: 24px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink-muted);
    }
    footer .ornament { color: var(--accent); margin-right: 8px; font-size: 13px; }
    footer a {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid rgba(26, 20, 16, 0.25);
      padding-bottom: 1px;
      transition: color 0.2s, border-color 0.2s;
    }
    footer a:hover { color: var(--accent); border-bottom-color: var(--accent); }

    @keyframes rise {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ---------- Pet counter ---------- */
    #pet-count { font-variant-numeric: tabular-nums; display: inline-block; }
    #pet-count.bump { animation: bump 0.45s ease-out; }
    @keyframes bump {
      0%   { transform: translateY(0); color: inherit; }
      40%  { transform: translateY(-3px); color: var(--accent); }
      100% { transform: translateY(0); color: inherit; }
    }

    .pet-float {
      position: absolute;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.05em;
      color: var(--accent);
      pointer-events: none;
      transform: translate(-50%, -50%);
      animation: petFloat 0.9s cubic-bezier(0.2, 0.7, 0.2, 1) forwards;
      z-index: 5;
      text-shadow: 0 1px 6px rgba(236, 228, 207, 0.85);
    }
    @keyframes petFloat {
      from { opacity: 1; transform: translate(-50%, -50%) scale(0.9); }
      to   { opacity: 0; transform: translate(-50%, calc(-50% - 48px)) scale(1.05); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; }
    }

    @media (max-width: 760px) {
      .page { padding: 24px 20px 56px; }
      .headline { font-size: 19vw; margin-top: 36px; }
      .section-label { margin-top: 72px; }
      main { row-gap: 56px; }
      .plate-1, .plate-2, .plate-3 { grid-column: 1 / -1; }
      figcaption { flex-direction: column; align-items: flex-start; gap: 6px; }
      .plate-title { text-align: left; }
      footer { flex-direction: column; gap: 6px; margin-top: 72px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="masthead">
      <span class="vol">Vol. I · Iss. 01 · MMXXVI</span>
      <span><span class="mark">●</span>Wrangell.dog</span>
    </div>

    <h1 class="headline">This <em>is</em> the<br>best dog<span class="period">.</span></h1>

    <p class="dek">An ongoing monograph of one (1) very good boy, observed at close range.</p>

    <div class="section-label">
      <span>Plates I&ndash;III</span>
      <span class="line"></span>
      <span><span id="pet-count">&mdash;</span> pets given</span>
    </div>

    <main>
      <figure class="plate plate-1" role="button" tabindex="0" aria-label="Pet Wrangell">
        <div class="frame"><img src="images/dog-1.jpeg" alt="Wrangell, plate one"></div>
        <figcaption>
          <span class="plate-num">Plate №01</span>
          <span class="plate-title">Costumed, briefly</span>
        </figcaption>
      </figure>

      <figure class="plate plate-2" role="button" tabindex="0" aria-label="Pet Wrangell">
        <div class="frame"><img src="images/dog-2.jpeg" alt="Wrangell, plate two"></div>
        <figcaption>
          <span class="plate-num">Plate №02</span>
          <span class="plate-title">An evening in</span>
        </figcaption>
      </figure>

      <figure class="plate plate-3" role="button" tabindex="0" aria-label="Pet Wrangell">
        <div class="frame"><img src="images/dog-3.jpeg" alt="Wrangell, plate three"></div>
        <figcaption>
          <span class="plate-num">Plate №03</span>
          <span class="plate-title">Under wool, undisturbed</span>
        </figcaption>
      </figure>
    </main>

    <footer>
      <span>© MMXXVI · Wrangell.dog</span>
      <span><a href="classic.html">Classic view</a></span>
      <span><span class="ornament">❦</span>For the record</span>
    </footer>
  </div>

  <script>
    (() => {
      const counterEl = document.getElementById('pet-count');
      const fmt = (n) => n.toLocaleString('en-US');

      function setCount(n) {
        counterEl.textContent = fmt(n);
      }

      function bump() {
        counterEl.classList.remove('bump');
        void counterEl.offsetWidth;
        counterEl.classList.add('bump');
      }

      function spawnFloat(plate, clientX, clientY) {
        const rect = plate.getBoundingClientRect();
        const el = document.createElement('span');
        el.className = 'pet-float';
        el.textContent = '+1';
        el.style.left = (clientX - rect.left) + 'px';
        el.style.top = (clientY - rect.top) + 'px';
        plate.appendChild(el);
        setTimeout(() => el.remove(), 900);
      }

      async function pet(plate, clientX, clientY) {
        spawnFloat(plate, clientX, clientY);
        try {
          const r = await fetch('/api/pets', { method: 'POST' });
          if (!r.ok) return;
          const { count } = await r.json();
          setCount(count);
          bump();
        } catch {}
      }

      async function loadCount() {
        try {
          const r = await fetch('/api/pets');
          if (!r.ok) return;
          const { count } = await r.json();
          setCount(count);
        } catch {}
      }

      document.querySelectorAll('.plate').forEach((plate) => {
        plate.addEventListener('click', (e) => {
          pet(plate, e.clientX, e.clientY);
        });
        plate.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            const rect = plate.getBoundingClientRect();
            pet(plate, rect.left + rect.width / 2, rect.top + rect.height / 2);
          }
        });
      });

      loadCount();
    })();
  </script>
</body>
</html>
