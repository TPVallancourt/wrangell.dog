<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="48x48" href="/favicon.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#ece4cf">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Wrangell">
  <title>The Best Dog</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      margin: 0;
      background: #fafafa;
    }
    h1 {
      font-size: 2.5rem;
      margin-bottom: 30px;
      text-align: center;
      letter-spacing: 1px;
    }
    img {
      max-width: 100%;
      height: auto;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
    }
    .view-toggle {
      position: fixed;
      top: 16px;
      right: 16px;
      font-size: 12px;
      letter-spacing: 0.05em;
      color: #666;
      text-decoration: none;
      padding: 6px 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      background: #fff;
    }
    .view-toggle:hover { color: #000; border-color: #999; }
  </style>
</head>
<body>
  <a class="view-toggle" href="/">New view</a>
  <h1>THIS IS THE BEST DOG</h1>
  <img src="images/dog-1.jpeg" alt="The best dog">
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
